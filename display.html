<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Times Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #101e2f;
    --bg2:         #101e2f;
    --bg3:         #172538;
    --bg4:         #142438;
    --gold:        #c8a46e;
    --gold2:       #8a6332;
    --gold-bright: #e0be78;
    --gold-dim:    rgba(200,164,110,0.12);
    --gold-line:   rgba(200,164,110,0.22);
    --text:        #eeebe5;
    --text2:       rgba(238,235,229,0.52);
    --text3:       rgba(238,235,229,0.26);
    --border:      rgba(255,255,255,0.06);
    --border2:     rgba(255,255,255,0.10);
    --active-bg:   rgba(200,164,110,0.065);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: clamp(12px,1.5vw,24px);
    background: var(--bg); z-index: 100;
    transition: opacity 0.7s ease;
  }
  #loading.fade-out { opacity: 0; pointer-events: none; }
  .l-logo {
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold-bright) 20%, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.03em;
  }
  .l-dots { display: flex; gap: clamp(5px,0.5vw,8px); }
  .l-dot {
    width: clamp(5px,0.55vw,8px); height: clamp(5px,0.55vw,8px);
    border-radius: 50%; background: var(--gold2);
    animation: ldot 1.2s ease-in-out infinite;
  }
  .l-dot:nth-child(2) { animation-delay: 0.2s; }
  .l-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes ldot { 0%,100%{opacity:.2;transform:scale(.7)} 50%{opacity:1;transform:scale(1)} }
  .clock-colon { display:inline; }

  /* ── ERROR ── */
  #error {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 0.7vw;
    background: var(--bg); z-index: 99;
  }
  #error.show { display: flex; }
  #error h2 { font-size: clamp(1.4rem,2vw,2rem); font-weight: 700; color: var(--gold); }
  #error p  { color: var(--text2); font-size: clamp(0.8rem,1vw,1rem); }

  /* ── APP SHELL ── */
  /* ── DESKTOP: card-column layout ── */
  body { overflow: hidden; }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: clamp(10px,1.5vw,24px);
    gap: 0;
    opacity: 0;
    transition: opacity 0.9s ease;
  }
  #app.visible { opacity: 1; }

  /* Hide sidebar on desktop too — card layout replaces it */
  .sidebar { display: none !important; }

  /* Desktop info card — mosque left, clock right */
  #mobile-info {
    display: flex !important;
    width: 100%;
    max-width: 1100px;
    align-items: center;
    gap: 16px;
    background: var(--bg);
    border: 1px solid rgba(200,164,110,0.35);
    border-radius: 12px;
    padding: 12px 24px;
    margin-bottom: 8px;
  }
  .mi-mosque { min-width: 0; flex: 1; }
  .mi-name {
    font-size: 1rem; font-weight: 700;
    color: var(--text); line-height: 1.2;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .mi-address {
    font-size: 0.72rem; color: var(--muted);
    line-height: 1.4; margin-top: 3px;
  }
  .mi-hijri {
    font-size: 0.68rem; color: var(--gold);
    opacity: 0.75; margin-top: 3px; line-height: 1.4;
  }
  .mi-divider {
    width: 1px; align-self: stretch;
    background: var(--border2); flex-shrink: 0;
  }
  .mi-clock {
    font-size: 1.8rem; font-weight: 500;
    color: var(--text); line-height: 1;
    font-variant-numeric: tabular-nums;
    white-space: nowrap; flex-shrink: 0; text-align: right;
    background: linear-gradient(155deg, var(--gold-bright) 20%, var(--gold) 80%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .mi-ampm {
    font-size: 0.75rem; font-weight: 600;
    margin-left: 2px; text-transform: uppercase; letter-spacing: 0.05em;
    background: none; -webkit-text-fill-color: var(--muted);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 0;
    gap: 0;
  }
  .sidebar-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: clamp(18px,2.2vw,44px) clamp(14px,1.9vw,36px);
    gap: 0;
    overflow: hidden;
  }

  /* Clock */
  .s-clock-wrap {
    margin-bottom: clamp(14px,1.6vw,30px);
  }
  #clock {
    font-size: clamp(2rem,4.8vw,4.6rem);
    font-weight: 500;
    letter-spacing: -0.045em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(155deg, var(--gold-bright) 20%, var(--gold) 80%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #date-gregorian {
    font-size: clamp(0.65rem,1.2vw,1.1rem);
    font-weight: 600;
    color: var(--text);
    margin-top: clamp(5px,0.6vw,10px);
    letter-spacing: -0.01em;
  }
  #date-hijri {
    font-size: clamp(0.6rem,1.05vw,0.95rem);
    font-weight: 400;
    color: var(--gold);
    opacity: 0.75;
    margin-top: 0.2em;
    letter-spacing: 0.01em;
  }

  /* Divider */
  .s-divider {
    width: 100%;
    height: 1px;
    background: var(--border2);
    margin: clamp(12px,1.4vw,26px) 0;
    flex-shrink: 0;
  }

  /* Mosque info */
  .s-mosque {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }
  .mosque-name {
    font-size: clamp(1rem,2vw,1.9rem);
    font-weight: 400;
    letter-spacing: -0.025em;
    line-height: 1.15;
    color: var(--text);
  }
  .mosque-address {
    font-size: clamp(0.65rem,1.2vw,1.1rem);
    color: var(--text);
    margin-top: 0.4em;
    font-weight: 600;
    line-height: 1.4;
    letter-spacing: -0.01em;
  }


  /* Silence notice */
  .silence-wrap {
    display: flex;
    align-items: flex-start;
    gap: clamp(6px,0.7vw,11px);
    margin-top: auto;
    padding-top: clamp(12px,1.4vw,24px);
  }
  .silence-icon {
    width: clamp(13px,1.3vw,22px);
    height: clamp(13px,1.3vw,22px);
    flex-shrink: 0;
    opacity: 0.38;
    margin-top: 0.1em;
  }
  .silence-text {
    font-size: clamp(0.72rem,1.15vw,1.05rem);
    font-weight: 500;
    color: var(--text3);
    line-height: 1.5;
    font-style: italic;
    text-wrap: pretty;
  }

  /* Background deco inside sidebar */
  .sidebar-deco {
    position: absolute;
    bottom: 0; left: 0;
    width: 26vw; height: 26vw;
    opacity: 0.018;
    pointer-events: none;
  }

  /* ── MAIN (prayer grid) ── */
  .main {
    width: 100%;
    max-width: 1100px;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    border: 1px solid rgba(200,164,110,0.35);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    padding: 0;
    margin-bottom: 0;
  }

  .pg-header {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    padding: 8px 24px;
    border-bottom: 1px solid var(--border2);
    background: transparent;
  }
  .pg-header span {
    font-size: 0.72rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text);
    opacity: 1;
  }
  .pg-header span:not(:first-child) { text-align: left; padding-left: clamp(8px,1.5vw,24px); }
  .p-cell { text-align: left; padding-left: clamp(8px,1.5vw,24px); }
  .p-jamaah-wrap { align-items: flex-start; padding-left: 0; }

  /* Rows */
  #rows {
    display: flex;
    flex-direction: column;
  }

  .prayer-row {
    display: grid;
    grid-template-columns: 1.5fr 1fr 1fr 1fr;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
    border-left: 3px solid transparent;
    align-items: center;
    min-height: 48px;
    transition: background 0.5s, border-left-color 0.5s;
    position: relative;
    overflow: hidden;
  }
  .prayer-row:last-child { border-bottom: none; }
  .prayer-row.active {
    background: var(--active-bg);
    border-left-color: var(--gold);
  }
  .prayer-row.active::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(200,164,110,0.06) 0%, transparent 60%);
    pointer-events: none;
    animation: rowglow 4s ease-in-out infinite;
  }
  @keyframes rowglow { 0%,100%{opacity:0} 50%{opacity:1} }

  .p-name-wrap { display: flex; flex-direction: column; gap: 0.08em; }
  .p-name {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    transition: color 0.4s;
  }
  .prayer-row.active .p-name { color: var(--gold); }
  .p-name-ar {
    font-size: clamp(0.58rem,0.95vw,0.88rem);
    color: var(--text3);
    font-weight: 400;
    letter-spacing: 0.04em;
    transition: color 0.4s;
  }
  .prayer-row.active .p-name-ar { color: var(--gold); opacity: 0.55; }

  .p-cell { text-align: left; padding-left: clamp(8px,1.5vw,24px); }

  .p-begins {
    font-size: 1rem;
    font-weight: 400;
    color: var(--text2);
    line-height: 1.45;
    font-variant-numeric: tabular-nums;
  }

  .p-jamaah-wrap { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 0.18em; }
  .p-jamaah {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    color: var(--text);
    transition: color 0.4s;
  }
  .prayer-row.active .p-jamaah {
    color: var(--gold-bright);
    text-decoration: underline;
    text-decoration-color: var(--gold);
    text-underline-offset: 0.25em;
    text-decoration-thickness: 2px;
  }

  /* Iqamah bar — shown on active row when between adhan and jamaah */
  .iqamah-bar-wrap {
    height: clamp(2px,0.22vw,3px);
    width: clamp(40px,5vw,90px);
    background: rgba(255,255,255,0.08);
    border-radius: 99px;
    overflow: hidden;
    opacity: 0;
    max-height: 0;
    transition: opacity 0.5s, max-height 0.5s;
  }
  .iqamah-bar-wrap.visible { opacity: 1; max-height: 4px; }
  .iqamah-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--gold2), var(--gold-bright));
    border-radius: 99px;
    width: 0%;
    transition: width 1s linear;
  }
  .iqamah-label {
    font-size: clamp(0.48rem,0.75vw,0.65rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--gold);
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.4s, max-height 0.4s;
  }
  .iqamah-label.visible { opacity: 0.8; max-height: 2em; }

  .p-tomorrow {
    font-size: 1rem;
    font-weight: 400;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
  }

  /* ── FOOTER ── */
  .footer-row {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    border: 1px solid rgba(200,164,110,0.35);
    border-top: 1px solid var(--border);
    border-radius: 0 0 12px 12px;
    padding: 10px 24px;
    margin-top: 0;
  }
  .f-cell { display: flex; flex-direction: column; gap: 0.1em; }
  .f-cell:last-child { text-align: right; align-items: flex-end; }
  .f-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.13em;
    font-weight: 700;
    color: var(--text2);
  }
  .f-value {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: -0.025em;
    font-variant-numeric: tabular-nums;
    color: var(--gold);
  }
  .brand {
    font-size: clamp(0.72rem,1.2vw,1.05rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 0.06em;
    text-align: center;
  }
  .brand-sub {
    font-size: clamp(0.44rem,0.72vw,0.62rem);
    color: var(--text3);
    font-weight: 400;
    text-align: center;
    margin-top: 0.15em;
    letter-spacing: 0.07em;
  }


  /* ── BLACKOUT ── */
  #blackout {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: #000;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: clamp(16px,2vw,32px);
    animation: fadeInBlack 1.5s ease forwards;
  }
  #blackout.active { display: flex; }
  @keyframes fadeInBlack { from{opacity:0} to{opacity:1} }
  .bo-icon {
    opacity: 0.35;
  }
  .bo-icon svg { width: clamp(48px,6vw,90px); height: clamp(48px,6vw,90px); }
  .bo-text {
    font-size: clamp(1.1rem,2.2vw,2rem);
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    text-align: center;
    max-width: 560px;
    line-height: 1.55;
    letter-spacing: 0.01em;
  }
  .bo-prayer {
    font-size: clamp(1.4rem,3vw,2.8rem);
    font-weight: 800;
    color: rgba(255,255,255,0.15);
    letter-spacing: -0.02em;
  }

  .bg-deco { display: none; }

  /* ── DESKTOP SIZE OVERRIDES (25% scale-up) ── */


  /* ── NEXT SALAH BANNER (desktop) ── */
  #mobile-banner {
    display: flex !important;
    width: 100%;
    max-width: 1100px;
    align-items: flex-end;
    justify-content: space-between;
    background: var(--bg);
    border: 1px solid rgba(200,164,110,0.35);
    border-radius: 12px;
    padding: 10px 24px;
    margin-top: 8px;
  }
  .mb-left .mb-label, .mb-right .mb-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.13em; text-transform: uppercase;
    color: var(--text);
    opacity: 0.6; margin-bottom: 2px;
  }
  .mb-prayer {
    font-size: 1.15rem; font-weight: 500;
    line-height: 1; letter-spacing: -0.025em;
    font-variant-numeric: tabular-nums;
    color: var(--gold);
  }
  .mb-right { text-align: right; }
  .mb-countdown {
    font-size: 1.15rem; font-weight: 500;
    line-height: 1; letter-spacing: -0.025em;
    font-variant-numeric: tabular-nums;
    color: var(--gold);
  }
  #mobile-iq-bar {
    display: none !important;
  }
    100% { transform: translateX(-50%); }
  }

  /* ── MOBILE ── */
  @media (max-width: 768px) {
    html { height: 100%; overflow: hidden; font-size: 11px; }
    body { background: var(--bg2); overflow: hidden; height: 100%; }

    body { overflow: hidden !important; }
    #app {
      display: flex !important;
      flex-direction: column !important;
      align-items: stretch !important;
      justify-content: flex-start !important;
      height: auto !important;
      min-height: 100vh !important;
      padding: 10px !important;
      padding-top: 8px !important;
      overflow: visible !important;
      gap: 0 !important;
    }

    .sidebar { display: none; }

    #mobile-info {
      display: flex !important;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 1px solid rgba(200,164,110,0.35);
      border-radius: 12px;
      padding: 8px 12px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    #mobile-iq-bar { display: none; }
    .mi-mosque { min-width: 0; flex: 1; }
    .mi-name {
      font-size: 0.72rem; font-weight: 700;
      color: var(--text); line-height: 1.2;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mi-address {
      font-size: 0.52rem; color: var(--muted);
      line-height: 1.4; margin-top: 2px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .mi-hijri {
      font-size: 0.52rem; color: var(--gold);
      opacity: 0.75; margin-top: 2px; line-height: 1.4;
    }
    .mi-divider {
      width: 1px; align-self: stretch;
      background: var(--border2); flex-shrink: 0;
    }
    .mi-clock {
      font-size: 1.2rem; font-weight: 500;
      color: var(--text); line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap; flex-shrink: 0; text-align: right;
    }
    .mi-ampm {
      font-size: 0.65rem; font-weight: 600;
      color: var(--muted); margin-left: 2px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .main {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 18px;
      overflow: hidden;
      padding: 0;
    }

    .main::before {
      content: 'PRAYER TIMES';
      display: block;
      font-size: 0.5rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--gold);
      padding: 14px 16px 0;
    }

    #mobile-banner {
      display: flex !important;
      align-items: flex-end;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid rgba(200,164,110,0.35);
      border-radius: 12px;
      margin-bottom: 8px;
      padding: 8px 12px;
    }
    .mb-right { text-align: right; }
    #mobile-iq-bar { margin: 0; border-radius: 0; }
    #mobile-iq-bar { display: block !important; }
    .mb-label {
      font-size: 0.45rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 3px;
    }
    .mb-prayer {
      font-size: 0.9rem; font-weight: 500;
      color: var(--text); line-height: 1;
    }
    .mb-right .mb-label { text-align: right; }
    .mb-countdown {
      font-size: 0.9rem; font-weight: 500;
      color: var(--gold); line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    #mobile-iq-bar {
      height: 3px;
      background: var(--gold);
      width: 0%;
      margin: 0 16px;
      border-radius: 0 0 3px 3px;
      transition: width 1s linear;
      box-shadow: 0 0 8px var(--gold);
    }

    .pg-header {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      margin-top: 14px;
    }
    .pg-header span {
      font-size: 0.52rem; font-weight: 600;
      letter-spacing: 0.06em; color: var(--muted);
      text-align: center; padding-left: 0;
    }
    .pg-header span:first-child { text-align: left; }
    /* Override desktop size-ups for mobile */
    .p-name { font-size: 0.82rem !important; }
    .p-begins { font-size: 0.72rem !important; }
    .p-jamaah { font-size: 0.78rem !important; }
    .p-tomorrow { font-size: 0.72rem !important; }
    .prayer-row {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .p-name { font-size: 0.82rem !important; font-weight: 700; color: var(--text); }
    .p-name-ar { display: none; }
    .p-begins { font-size: 0.72rem !important; font-weight: 400; color: var(--muted); text-align: center; }
    .p-jamaah { font-size: 0.78rem !important; font-weight: 800; color: var(--text); text-align: center; }
    .prayer-row.active .p-jamaah { color: var(--gold); }
    .p-tomorrow { font-size: 0.72rem !important; font-weight: 400; color: var(--muted); text-align: center; }

    /* On mobile, visually attach footer to the card */
    #app {
      display: flex;
      flex-direction: column;
    }
    .main {
      order: 1;
      /* extend border-radius only on top, footer attaches below */
      border-radius: 18px 18px 0 0;
    }
    .footer-row {
      order: 2;
      border-top: 1px solid var(--border);

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SB  = 'https://bfevwoykvnogmgxdkxdj.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZXZ3b3lrdm5vZ21neGRreGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDgwNjEsImV4cCI6MjA5MTcyNDA2MX0.8I--P9h_jYsSlvkthF76O1m0mcFkgI8mcRmKVgXOHAk';

const PNAMES  = ['fajr','zuhr','asr','maghrib','isha'];
const PLABELS = { fajr:'Fajr', zuhr:'Zuhr', asr:'Asr', maghrib:'Maghrib', isha:'Isha' };
const ARABIC  = { fajr:'الفجر', zuhr:'الظهر', asr:'العصر', maghrib:'المغرب', isha:'العشاء' };

// Demo fallback
const DEMO = {
  mosque:   { name: 'Dar al Arqam', address: '1 Kitcat Terrace, Bow, London E3 2SA', jummah: '1:00 PM', jummah2: '1:30 PM', jummah3: '2:00 PM', lat: 51.527, lon: -0.017 },
  today:    { fajr_begins:'4:04', fajr_jamaah:'4:34', zuhr_begins:'13:03', zuhr_jamaah:'13:30', asr_begins:'18:00', asr_jamaah:'18:30', maghrib_begins:'20:19', maghrib_jamaah:'20:26', isha_begins:'21:31', isha_jamaah:'22:00' },
  tomorrow: { fajr_jamaah:'4:34', zuhr_jamaah:'13:30', asr_jamaah:'18:30', maghrib_jamaah:'20:27', isha_jamaah:'22:00' }
};

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getSlug() {
  const m = location.pathname.match(/\/(?:display|tv|screen)\/([^/?#]+)/);
  if (m) return m[1];
  return new URLSearchParams(location.search).get('mosque');
}

async function sbGet(path) {
  const r = await fetch(`${SB}/rest/v1/${path}`, { headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` } });
  if (!r.ok) throw new Error(`${r.status}`);
  return r.json();
}

function fmt(s) {
  if (!s) return '—';
  s = s.trim();
  if (/[AP]M/i.test(s)) return s.replace(/\s*([AP]M)/i, '\u2009$1');
  const [h, m] = s.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) return s;
  return `${h % 12 || 12}:${String(m).padStart(2, '0')}`;
}

function toMins(s) {
  if (!s) return null;
  s = s.trim();
  const ap = s.match(/^(\d+):(\d+)\s*([AP]M)$/i);
  if (ap) {
    let h = +ap[1], ampm = ap[3].toUpperCase();
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    return h * 60 + +ap[2];
  }
  const pl = s.match(/^(\d+):(\d+)$/);
  if (pl) return +pl[1] * 60 + +pl[2];
  return null;
}

function calcSunrise(lat, lon, d) {
  const rad    = Math.PI / 180;
  const dy     = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 864e5);
  const B      = (360 / 365 * (dy - 81)) * rad;
  const EoT    = 9.87 * Math.sin(2 * B) - 7.53 * Math.cos(B) - 1.5 * Math.sin(B);
  const dec    = 23.45 * Math.sin(B) * rad;
  const ha     = Math.acos(-Math.tan(lat * rad) * Math.tan(dec)) / rad;
  const srUtc  = 12 - lon / 15 - EoT / 60 - ha / 15;
  // Apply local UTC offset (handles BST/GMT automatically)
  const offsetH = -d.getTimezoneOffset() / 60;
  const sr     = srUtc + offsetH;
  const h      = Math.floor(sr), m = Math.round((sr - h) * 60);
  return `${h % 12 || 12}:${String(m).padStart(2, '0')} AM`;
}

function ukDate(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function hijriDate(d) {
  try {
    return new Intl.DateTimeFormat('en-TN-u-ca-islamic', { day: 'numeric', month: 'long', year: 'numeric' }).format(d);
  } catch { return ''; }
}

// ── RENDER ROWS ───────────────────────────────────────────────────────────────
function renderRows(tod, tom) {
  const cont = document.getElementById('rows');
  cont.innerHTML = '';
  PNAMES.forEach(p => {
    const begins  = tod[`${p}_begins`] || '';
    const begins2 = tod[`${p}_begins_secondary`] || null;
    const jamaah  = tod[`${p}_jamaah`];
    const tmr     = tom?.[`${p}_jamaah`];

    const parts = begins.split(/[\n/\\|]/).map(s => s.trim()).filter(Boolean);
    let beginsHtml;
    if (parts.length > 1) {
      beginsHtml = parts.map(x => `<div>${fmt(x)}</div>`).join('');
    } else if (begins2) {
      beginsHtml = `<div>${fmt(begins)}</div><div>${fmt(begins2)}</div>`;
    } else {
      beginsHtml = `<div>${fmt(begins)}</div>`;
    }

    const row = document.createElement('div');
    row.className = 'prayer-row';
    row.dataset.p      = p;
    row.dataset.begins = begins;
    row.dataset.jamaah = jamaah || '';
    row.innerHTML = `
      <div class="p-name-wrap">
        <div class="p-name">${PLABELS[p]}</div>
        <div class="p-name-ar">${ARABIC[p]}</div>
      </div>
      <div class="p-cell p-begins">${beginsHtml}</div>
      <div class="p-cell p-jamaah-wrap">
        <div class="p-jamaah">${fmt(jamaah)}</div>
        <div class="iqamah-bar-wrap" id="ib-${p}"><div class="iqamah-bar-inner" id="ibi-${p}"></div></div>
        <div class="iqamah-label" id="il-${p}">Iqamah</div>
      </div>
      <div class="p-cell p-tomorrow">${tmr ? fmt(tmr) : '—'}</div>
    `;
    cont.appendChild(row);
  });
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function startClock() {
  const clockEl = document.getElementById('clock');
  const gregEl  = document.getElementById('date-gregorian');
  const hijriEl = document.getElementById('date-hijri');

  function tick() {
    const now = new Date();
    const h12 = now.getHours() % 12 || 12;
    const mm  = String(now.getMinutes()).padStart(2, '0');
    const ap  = now.getHours() >= 12 ? 'PM' : 'AM';
    clockEl.innerHTML = `${h12}<span class="clock-colon">:</span>${mm} ${ap}`;
    var miTime = document.getElementById('mi-time');
    var miAmpm = document.getElementById('mi-ampm');
    if (miTime) miTime.textContent = `${h12}:${mm}`;
    if (miAmpm) miAmpm.textContent = ap;
    var miHijri = document.getElementById('mi-hijri');
    if (miHijri) miHijri.textContent = hijriDate();
    gregEl.textContent  = ukDate(now);
    const hd = hijriDate(now);
    hijriEl.textContent = hd || '';
    hijriEl.style.display = hd ? '' : 'none';
  }
  tick();
  setInterval(tick, 1000);
}

// ── ACTIVE ROW + IQAMAH BARS ──────────────────────────────────────────────────
function startActiveTracking(tod, tom) {
  function tick() {
    const now  = new Date();
    const nowS = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
    const nowM = now.getHours() * 60 + now.getMinutes();

    // Find next jamaah
    let nextJamaahM = null, nextPrayer = null;
    for (const p of PNAMES) {
      const jM = toMins(tod[`${p}_jamaah`]);
      if (jM !== null && jM > nowM) { nextJamaahM = jM; nextPrayer = p; break; }
    }
    if (!nextPrayer && tom) {
      const m = toMins(tom.fajr_jamaah);
      if (m !== null) { nextPrayer = 'fajr'; }
    }

    PNAMES.forEach(p => {
      const row    = document.querySelector(`.prayer-row[data-p="${p}"]`);
      const barW   = document.getElementById(`ib-${p}`);
      const barI   = document.getElementById(`ibi-${p}`);
      const label  = document.getElementById(`il-${p}`);
      if (!row) return;

      const bM = toMins(tod[`${p}_begins`]);
      const jM = toMins(tod[`${p}_jamaah`]);
      const inWindow = bM !== null && jM !== null && nowM >= bM && nowM < jM;

      row.classList.toggle('active', p === nextPrayer || inWindow);

      if (inWindow && barW && barI && label) {
        const totalS  = (jM - bM) * 60;
        const elapsed = nowS - bM * 60;
        const pct     = Math.min(100, (elapsed / totalS) * 100);
        barI.style.width = pct + '%';
        barW.classList.add('visible');
        label.classList.add('visible');
      } else {
        if (barW) barW.classList.remove('visible');
        if (label) label.classList.remove('visible');
      }
    });
  }

  tick();
  setInterval(tick, 1000);

  // Mobile banner countdown
  function tickMobile() {
    const isMobile = window.innerWidth <= 768;
    const banner = document.getElementById('mobile-banner');
    const iqBar  = document.getElementById('mobile-iq-bar');
    if (!banner) return;

    const now   = new Date();
    const nowS  = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    let target = null, nextP = null, beginsS = null;

    for (const p of PNAMES) {
      const jM = toMins(tod[p+'_jamaah']);
      const bM = toMins(tod[p+'_begins']);
      if (jM !== null && jM*60 > nowS) {
        target  = jM*60;
        nextP   = p;
        beginsS = bM !== null ? bM*60 : null;
        break;
      }
    }
    if (!target && tom) {
      const jM = toMins(tom.fajr_jamaah);
      if (jM !== null) { target = (24*60+jM)*60; nextP = 'fajr'; }
    }

    if (!nextP) return;

    document.getElementById('mb-prayer').textContent = PLABELS[nextP] || nextP;

    const diff = Math.max(0, target - nowS);
    const hh = Math.floor(diff/3600);
    const mm = Math.floor(diff%3600/60);
    const ss = diff%60;
    document.getElementById('mb-countdown').textContent =
      `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;

    // Iqamah progress bar
    if (beginsS !== null && nowS >= beginsS && nowS <= target) {
      const pct = ((nowS - beginsS) / (target - beginsS)) * 100;
      if (iqBar) iqBar.style.width = Math.min(100,pct).toFixed(1)+'%';
    } else {
      if (iqBar) iqBar.style.width = '0%';
    }
  }
  tickMobile();
  setInterval(tickMobile, 1000);

  // Blackout: trigger at jamaah time for 10 minutes
  function checkBlackout() {
    const now  = new Date();
    const nowM = now.getHours() * 60 + now.getMinutes();
    const bo   = document.getElementById('blackout');
    const boPr = document.getElementById('bo-prayer');
    let inBlackout = false, prayerName = '';
    for (const p of PNAMES) {
      const jM = toMins(tod[`${p}_jamaah`]);
      if (jM !== null && nowM >= jM && nowM < jM + 10) {
        inBlackout = true;
        prayerName = PLABELS[p];
        break;
      }
    }
    if (inBlackout) {
      boPr.textContent = prayerName;
      bo.classList.add('active');
    } else {
      bo.classList.remove('active');
    }
  }
  checkBlackout();
  setInterval(checkBlackout, 10000);

}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  const slug   = getSlug();
  const loadEl = document.getElementById('loading');
  const appEl  = document.getElementById('app');
  const errEl  = document.getElementById('error');

  function launch(mosque, tod, tom) {
    document.getElementById('mosque-name').textContent    = mosque.name;
    document.getElementById('mosque-address').textContent = mosque.address || mosque.area || '';
    var miName = document.getElementById('mi-name');
    var miAddr = document.getElementById('mi-address');
    if (miName) miName.textContent = mosque.name || '';
    if (miAddr) miAddr.textContent = mosque.address || mosque.area || '';
    document.title = `${mosque.name} — Prayer Times`;

    async function setSunrise(lat, lon) {
      document.getElementById('sunrise').textContent = calcSunrise(lat, lon, new Date());
    }
    if (mosque.lat && mosque.lon) {
      setSunrise(mosque.lat, mosque.lon);
    } else if (mosque.address) {
      fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(mosque.address))
        .then(r => r.json())
        .then(results => {
          if (results && results[0]) setSunrise(parseFloat(results[0].lat), parseFloat(results[0].lon));
        })
        .catch(() => {});
    }

    renderRows(tod, tom);
    loadEvents(mosque.id);
    initJummahAnimator(mosque);
    startClock();
    startActiveTracking(tod, tom);

    // Midnight refresh
    const midnight = new Date(); midnight.setHours(24, 0, 30, 0);
    setTimeout(() => location.reload(), midnight - new Date());

    loadEl.classList.add('fade-out');
    setTimeout(() => { loadEl.style.display = 'none'; appEl.classList.add('visible'); }, 700);
  }

  if (!slug) {
    launch(DEMO.mosque, DEMO.today, DEMO.tomorrow);
    return;
  }

  try {
    const mosques = await sbGet('mosques?select=id,name,address,area,jummah,jummah2,jummah3,lat,lon&slug=eq.' + slug + '&limit=1');
    const mosque  = mosques[0];
    if (!mosque) throw new Error('not found');

    const today = new Date().toISOString().split('T')[0];
    const tmrD  = new Date(); tmrD.setDate(tmrD.getDate() + 1);
    const tmr   = tmrD.toISOString().split('T')[0];

    const prayers = await sbGet(
      'prayer_timetables?select=*&mosque_id=eq.' + mosque.id +
      '&date=in.(' + today + ',' + tmr + ')&order=date.asc'
    );

    const tod = prayers.find(p => p.date === today);
    const tom = prayers.find(p => p.date === tmr);
    if (!tod) throw new Error('no prayer times for today');

    launch(mosque, tod, tom);

  } catch (err) {
    console.error(err);
    if (err.message === 'not found') {
      launch(DEMO.mosque, DEMO.today, DEMO.tomorrow);
    } else {
      loadEl.style.display = 'none';
      errEl.classList.add('show');
      document.getElementById('err-msg').textContent = `Error: ${err.message}`;
    }
  }
}

init();


// ── JUMMAH ANIMATOR ────────────────────────────────────────────────────────────
function initJummahAnimator(mosque) {
  const wrap = document.getElementById('jummah-wrap');
  if (!wrap) return;
  const times = [mosque.jummah, mosque.jummah2, mosque.jummah3].filter(Boolean);
  if (!times.length) { wrap.textContent = '—'; return; }
  if (times.length === 1) { wrap.textContent = fmt(times[0]); return; }
  let idx = 0;
  const labels = ["Jumuʼah", "2nd Jumuʼah", "3rd Jumuʼah"];
  function show() {
    wrap.innerHTML = '';
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text2);margin-bottom:1px;';
    lbl.textContent = labels[idx] || ("Jumuah " + (idx + 1));
    const val = document.createElement('div');
    val.textContent = fmt(times[idx]);
    wrap.appendChild(lbl);
    wrap.appendChild(val);
  }
  show();
  setInterval(() => { idx = (idx + 1) % times.length; show(); }, 10000);
}

// ── EVENTS CARDS ──────────────────────────────────────────────────────────────
async function loadEvents(mosqueId) {
  try {
    const rows = await sbGet(
      'announcements?select=title,description,category,date&mosque_id=eq.' + mosqueId +
      '&active=eq.true&category=in.' + encodeURIComponent('(class,event)') + '&order=sort_order.asc&limit=6'
    );
    if (!rows || !rows.length) return;

    const panel     = document.getElementById('events-panel');
    const evFooter  = document.getElementById('ev-footer');
    const dotsEl    = document.getElementById('ev-dots');
    const counter   = document.getElementById('ev-counter');
    // The elements to hide when showing events
    const main      = document.querySelector('main.main');
    const footerRow = document.querySelector('.footer-row');

    const PAGE_SIZE = 10;
    const pages = [];
    for (let i = 0; i < rows.length; i += PAGE_SIZE) {
      pages.push(rows.slice(i, i + PAGE_SIZE));
    }
    let pageIdx = 0;

    function buildPage(pageRows) {
      panel.innerHTML = '';
      // Header
      const hdr = document.createElement('div');
      hdr.style.cssText = 'padding:12px 24px 10px;font-size:0.55rem;font-weight:800;text-transform:uppercase;letter-spacing:0.13em;color:var(--gold);border-bottom:1px solid rgba(200,164,110,0.2);flex-shrink:0;display:flex;justify-content:space-between;align-items:center;';
      const hdrTitle = document.createElement('span');
      hdrTitle.textContent = 'Classes & Events';
      hdr.appendChild(hdrTitle);
      if (pages.length > 1) {
        const pg = document.createElement('span');
        pg.style.cssText = 'font-size:0.5rem;opacity:0.5;font-weight:400;text-transform:none;letter-spacing:0;';
        pg.textContent = (pageIdx + 1) + ' / ' + pages.length;
        hdr.appendChild(pg);
      }
      panel.appendChild(hdr);

      const grid = document.createElement('div');
      grid.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;flex:1;';
      panel.appendChild(grid);

      pageRows.forEach((r, ri) => {
        const item = document.createElement('div');
        const isLeft = ri % 2 === 0;
        item.style.cssText = 'display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.06);min-width:0;' + (isLeft ? 'border-right:1px solid rgba(255,255,255,0.06);' : '');
        const badge = document.createElement('div');
        badge.className = 'ev-badge ' + (r.category || 'event');
        badge.textContent = r.category === 'class' ? 'Class' : 'Event';
        const info = document.createElement('div');
        const title = document.createElement('div');
        title.style.cssText = 'font-size:0.82rem;font-weight:700;line-height:1.2;color:var(--text);';
        title.textContent = r.title;
        info.appendChild(title);
        if (r.description) {
          const desc = document.createElement('div');
          desc.style.cssText = 'font-size:0.65rem;color:var(--muted);margin-top:2px;line-height:1.3;';
          desc.textContent = r.description;
          info.appendChild(desc);
        }
        if (r.date) {
          const dt = document.createElement('div');
          dt.style.cssText = 'font-size:0.6rem;color:var(--gold);margin-top:2px;font-weight:600;';
          dt.textContent = new Date(r.date).toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
          info.appendChild(dt);
        }
        item.appendChild(badge);
        item.appendChild(info);
        grid.appendChild(item);
      });
    }

    function positionPanel() {
      const mRect = main.getBoundingClientRect();
      const fRect = footerRow.getBoundingClientRect();
      panel.style.top    = (mRect.top + window.scrollY) + 'px';
      panel.style.left   = (mRect.left + window.scrollX) + 'px';
      panel.style.width  = mRect.width + 'px';
      panel.style.height = (fRect.bottom - mRect.top) + 'px';
    }

    // Set transitions once
    main.style.transition = 'opacity 0.5s';
    footerRow.style.transition = 'opacity 0.5s';
    panel.style.transition = 'opacity 0.5s';

    function showEvents() {
      positionPanel();
      panel.style.display = 'flex';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        main.style.opacity = '0';
        main.style.pointerEvents = 'none';
        footerRow.style.opacity = '0';
        footerRow.style.pointerEvents = 'none';
        panel.style.opacity = '1';
      }));
    }

    function hideEvents() {
      panel.style.opacity = '0';
      main.style.opacity = '1';
      main.style.pointerEvents = '';
      footerRow.style.opacity = '1';
      footerRow.style.pointerEvents = '';
      setTimeout(() => { panel.style.display = 'none'; }, 500);
    }

    function startEventsCycle() {
      pageIdx = 0;
      buildPage(pages[0]);
      showEvents();
      // Advance page every 6s
      let pageTimer = setInterval(() => {
        pageIdx = (pageIdx + 1) % pages.length;
        panel.style.opacity = '0';
        setTimeout(() => {
          buildPage(pages[pageIdx]);
          panel.style.opacity = '1';
        }, 300);
      }, 6000);
      // After all pages shown, go back to prayer
      setTimeout(() => {
        clearInterval(pageTimer);
        hideEvents();
        setTimeout(startEventsCycle, 20000);
      }, pages.length * 6000 + 500);
    }

    setTimeout(startEventsCycle, 20000);

  } catch(e) { console.warn('Events load failed', e); }
}
</script>
