<svg xmlns="http://www.w3.org/2000/svg" width="720" height="460" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Qiblah TV display preview</title>
  <desc id="desc">Animated preview of a mosque TV display showing prayer times, announcements and iqamah countdown.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a2d45"/>
      <stop offset="1" stop-color="#101e2f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#e0be78"/>
      <stop offset="1" stop-color="#c8a46e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity=".34"/>
    </filter>
    <style>
      text { font-family: Outfit, Arial, sans-serif; }
      .muted { fill: rgba(238,235,229,.62); }
      .text { fill: #eeebe5; }
      .gold { fill: #c8a46e; }
      .head { font-size: 18px; font-weight: 800; letter-spacing: 4px; }
      .name { font-size: 34px; font-weight: 800; }
      .time { font-size: 34px; font-weight: 500; font-variant-numeric: tabular-nums; }
      .strong { font-weight: 900; fill: #eeebe5; }
      .small { font-size: 16px; font-weight: 700; letter-spacing: 2px; }
      .ticker { animation: ticker 5.5s linear infinite; }
      .pulse { animation: pulse 1.8s ease-in-out infinite; transform-origin: 360px 130px; }
      .rowGlow { animation: rowGlow 5.5s ease-in-out infinite; }
      .count1 { animation: count1 5.5s steps(1,end) infinite; }
      .count2 { animation: count2 5.5s steps(1,end) infinite; }
      .count3 { animation: count3 5.5s steps(1,end) infinite; }
      @keyframes pulse { 0%,100% { opacity:.55 } 50% { opacity:1 } }
      @keyframes rowGlow { 0%,45%,100% { opacity:.08 } 12%,32% { opacity:.22 } }
      @keyframes ticker { from { transform: translateX(0) } to { transform: translateX(-360px) } }
      @keyframes count1 { 0%,32% { opacity:1 } 33%,100% { opacity:0 } }
      @keyframes count2 { 0%,32% { opacity:0 } 33%,65% { opacity:1 } 66%,100% { opacity:0 } }
      @keyframes count3 { 0%,65% { opacity:0 } 66%,100% { opacity:1 } }
    </style>
  </defs>

  <rect width="720" height="460" rx="28" fill="url(#bg)"/>
  <rect x="18" y="18" width="684" height="424" rx="20" fill="#102033" stroke="rgba(200,164,110,.42)" filter="url(#shadow)"/>

  <g transform="translate(42 42)">
    <circle cx="28" cy="28" r="24" fill="none" stroke="#c8a46e" stroke-width="3"/>
    <path d="M28 12c-8 7-12 13-12 18 0 7 5 12 12 12s12-5 12-12c0-5-4-11-12-18z" fill="#eeebe5" opacity=".9"/>
    <text x="68" y="24" class="text" font-size="24" font-weight="800">Dar al Arqam</text>
    <text x="68" y="50" class="gold" font-size="16" font-weight="600">Dhu'l-Qi'dah 12, 1447 AH</text>
    <text x="575" y="31" text-anchor="end" class="gold time" font-size="30">2:25</text>
    <text x="610" y="31" class="muted" font-size="15" font-weight="800">AM</text>
  </g>

  <g transform="translate(42 105)">
    <rect width="636" height="256" rx="16" fill="#101e2f" stroke="rgba(200,164,110,.34)"/>
    <rect width="636" height="42" rx="16" fill="#13243a"/>
    <text x="260" y="27" text-anchor="middle" class="muted head">BEGINS</text>
    <text x="405" y="27" text-anchor="middle" class="muted head">JAMAAH</text>
    <text x="555" y="27" text-anchor="middle" class="muted head">TOMORROW</text>

    <rect class="rowGlow" x="0" y="42" width="636" height="54" fill="#c8a46e"/>
    <rect x="0" y="42" width="4" height="54" fill="#c8a46e"/>

    <line x1="0" y1="96" x2="636" y2="96" stroke="rgba(255,255,255,.08)"/>
    <line x1="0" y1="150" x2="636" y2="150" stroke="rgba(255,255,255,.08)"/>
    <line x1="0" y1="204" x2="636" y2="204" stroke="rgba(255,255,255,.08)"/>

    <text x="30" y="78" class="gold name" font-size="25">Fajr</text>
    <text x="260" y="78" text-anchor="middle" class="muted time" font-size="25">3:58</text>
    <text x="405" y="78" text-anchor="middle" class="gold time strong pulse" font-size="25">4:28</text>
    <text x="555" y="78" text-anchor="middle" class="muted time" font-size="25">4:25</text>

    <text x="30" y="132" class="text name" font-size="25">Zuhr</text>
    <text x="260" y="132" text-anchor="middle" class="muted time" font-size="25">1:03</text>
    <text x="405" y="132" text-anchor="middle" class="text time strong" font-size="25">1:30</text>
    <text x="555" y="132" text-anchor="middle" class="muted time" font-size="25">1:30</text>

    <text x="30" y="186" class="text name" font-size="25">Asr</text>
    <text x="260" y="180" text-anchor="middle" class="muted time" font-size="23">5:00</text>
    <text x="260" y="206" text-anchor="middle" class="muted time" opacity=".55" font-size="20">6:03</text>
    <text x="405" y="186" text-anchor="middle" class="text time strong" font-size="25">6:30</text>
    <text x="555" y="186" text-anchor="middle" class="muted time" font-size="25">6:30</text>

    <text x="30" y="240" class="text name" font-size="25">Isha</text>
    <text x="260" y="240" text-anchor="middle" class="muted time" font-size="25">9:35</text>
    <text x="405" y="240" text-anchor="middle" class="text time strong" font-size="25">10:00</text>
    <text x="555" y="240" text-anchor="middle" class="muted time" font-size="25">10:00</text>
  </g>

  <g transform="translate(42 376)">
    <rect width="636" height="44" rx="14" fill="#13243a" stroke="rgba(200,164,110,.34)"/>
    <text x="24" y="18" class="muted small">NEXT SALAH</text>
    <text x="24" y="35" class="gold" font-size="22" font-weight="800">Fajr</text>
    <g clip-path="inset(0 172 0 176)">
      <text class="ticker muted" x="195" y="28" font-size="17">Please keep your phone on silent · Weekly tafsir after Maghrib · Please keep your phone on silent · Weekly tafsir after Maghrib</text>
    </g>
    <text x="520" y="18" class="muted small">IQAMAH</text>
    <text class="count1 gold" x="520" y="35" font-size="22" font-weight="900">02:02:06</text>
    <text class="count2 gold" x="520" y="35" font-size="22" font-weight="900">02:02:05</text>
    <text class="count3 gold" x="520" y="35" font-size="22" font-weight="900">02:02:04</text>
  </g>
</svg>
