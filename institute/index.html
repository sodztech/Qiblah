<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Institute Admin — Qiblah</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8; --bg2: #ede8de; --bg3: #e5dfd4;
  --card: #ffffff; --card2: #f0ebe0;
  --gold: #9b7f4e; --gold2: #7d6338;
  --text: #1e1c18; --muted: #7a7060;
  --border: rgba(0,0,0,0.07);
  --radius: 16px;
  --green: #047857; --red: #be123c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header { background: rgba(245,240,232,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 700; }
.logo svg { width: 26px; height: 26px; }
.inst-pill { background: rgba(155,127,78,0.12); border: 1px solid rgba(155,127,78,0.25); color: var(--gold); font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; }

#login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px; max-width: 420px; width: 100%; }
.login-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.login-card p { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }
.field input, .field select, .field textarea { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: rgba(155,127,78,0.4); }
.field input::placeholder, .field textarea::placeholder { color: var(--muted); }
.field textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
.btn { width: 100%; background: var(--gold); color: #ffffff; font-size: 14px; font-weight: 700; padding: 12px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; transition: background 0.2s; }
.btn:hover { background: var(--gold2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg2); }
.btn-danger { background: rgba(190,18,60,0.08); color: var(--red); border: 1px solid rgba(190,18,60,0.2); }
.error-msg { background: rgba(190,18,60,0.08); border: 1px solid rgba(190,18,60,0.25); color: #9f1239; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }
.success-msg { background: rgba(4,120,87,0.08); border: 1px solid rgba(4,120,87,0.25); color: #065f46; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; }

#dashboard { display: none; padding: 24px; max-width: 760px; margin: 0 auto; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.dash-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
.dash-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: var(--text); }
.dash-card h3 svg { width: 16px; height: 16px; color: var(--gold); }
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.save-row { display: flex; gap: 10px; margin-top: 16px; }
.save-row .btn { width: auto; flex: 1; }
#save-status { display: none; align-items: center; gap: 8px; font-size: 13px; color: var(--green); margin-top: 12px; }

.service-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border); }
.service-item:first-child { border-top: none; }
.service-info { flex: 1; }
.service-info .sname { font-size: 14px; font-weight: 500; }
.service-info .smeta { font-size: 12px; color: var(--muted); }
.del-btn { background: rgba(190,18,60,0.08); border: none; color: var(--red); width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.add-service-form { background: var(--card2); border-radius: 10px; padding: 16px; margin-top: 12px; display: none; }
.type-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; margin-left: 6px; }
.t-Education  { background: rgba(13,148,136,0.14); color: #0f766e; }
.t-Youth      { background: rgba(194,65,12,0.12);  color: #c2410c; }
.t-Welfare    { background: rgba(159,18,57,0.12);  color: #9f1239; }
.t-Community  { background: rgba(4,120,87,0.12);   color: #065f46; }

.announcement-item { padding: 12px 0; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
.announcement-item:first-child { border-top: none; }
.ann-body { flex: 1; }
.ann-body .atitle { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
.ann-body .adesc { font-size: 12px; color: var(--muted); }

.tabs { display: flex; gap: 4px; background: var(--card2); border-radius: 10px; padding: 4px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 500; border-radius: 7px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: inherit; transition: all 0.2s; min-width: 80px; }
.tab.active { background: var(--card); color: var(--text); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

.saving-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(155,127,78,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 600px) {
  .row-2 { grid-template-columns: 1fr; }
  nav { padding: 0 16px; }
}
</style>
</head>
<body>

<div id="header" style="display:none">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 28 28" fill="none" width="24" height="24">
        <circle cx="14" cy="14" r="11" stroke="#9b7f4e" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="2" fill="#9b7f4e"/>
        <path d="M14 3v4M14 21v4M3 14h4M21 14h4" stroke="#9b7f4e" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M14 14 L17 8" stroke="#9b7f4e" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Qiblah
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <span class="inst-pill" id="header-inst-name"></span>
      <button onclick="doLogout()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;font-family:inherit">Sign out</button>
    </div>
  </div>
</div>

<div id="login-screen">
  <div class="login-card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px">
      <svg viewBox="0 0 28 28" fill="none" width="32" height="32">
        <circle cx="14" cy="14" r="11" stroke="#9b7f4e" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="2" fill="#9b7f4e"/>
        <path d="M14 3v4M14 21v4M3 14h4M21 14h4" stroke="#9b7f4e" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M14 14 L17 8" stroke="#9b7f4e" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span style="font-size:20px;font-weight:700">Qiblah</span>
      <span style="font-size:12px;color:var(--muted);margin-left:4px">Institute Admin</span>
    </div>
    <h1>Institute Portal</h1>
    <p>Manage your institute profile, services and announcements.</p>
    <div id="login-error" style="display:none" class="error-msg"></div>
    <div class="field">
      <label>Institute ID</label>
      <input type="text" id="inst-id-input" placeholder="e.g. east-london-madrasa" autocomplete="off">
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="password" id="inst-pin-input" placeholder="4-digit PIN" maxlength="6" autocomplete="off">
    </div>
    <button class="btn" id="login-btn">Sign In</button>
    <p style="font-size:12px;color:var(--muted);margin-top:16px;text-align:center">Don't have access? <a href="mailto:admin@qiblah.app" style="color:var(--gold)">Contact us</a></p>
  </div>
</div>

<div id="dashboard">
  <div style="margin-bottom:24px">
    <h1 style="font-size:24px;font-weight:800;margin-bottom:4px" id="dash-inst-title"></h1>
    <p style="font-size:13px;color:var(--muted)" id="dash-inst-address"></p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('profile')">Profile</button>
    <button class="tab" onclick="switchTab('services')">Services</button>
    <button class="tab" onclick="switchTab('announce')">Announcements</button>
    <button class="tab" onclick="switchTab('pin')">Change PIN</button>
  </div>

  <!-- PROFILE TAB -->
  <div id="tab-profile">
    <div class="dash-card">
      <h3>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        Institute Profile
      </h3>
      <div class="field"><label>Name</label><input type="text" id="profile-name" placeholder="Institute name"></div>
      <div class="row-2">
        <div class="field"><label>Type</label>
          <select id="profile-type">
            <option>School</option><option>Madrasa</option><option>Islamic Centre</option><option>Community Centre</option><option>Academy</option>
          </select>
        </div>
        <div class="field"><label>Area</label><input type="text" id="profile-area" placeholder="e.g. Whitechapel"></div>
      </div>
      <div class="field"><label>Address</label><input type="text" id="profile-address" placeholder="Full address"></div>
      <div class="row-2">
        <div class="field"><label>Phone</label><input type="text" id="profile-phone" placeholder="020 XXXX XXXX"></div>
        <div class="field"><label>Website</label><input type="text" id="profile-website" placeholder="https://..."></div>
      </div>
      <div class="field"><label>About</label><textarea id="profile-about" placeholder="Brief description of your institute..."></textarea></div>
      <div class="save-row">
        <button class="btn" onclick="saveProfile()">Save Profile</button>
      </div>
      <div id="save-status"></div>
    </div>
  </div>

  <!-- SERVICES TAB -->
  <div id="tab-services" style="display:none">
    <div class="dash-card">
      <h3>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.53 15.47 0 12.36 0c-1.73 0-3.25.87-4.19 2.19L12 6H8.31L7.08 3.96C6.44 3.36 5.56 3 4.64 3 2.61 3 1 4.61 1 6.64c0 1.46.81 2.72 2 3.37V20c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
        Services
      </h3>
      <div id="services-list"><p style="color:var(--muted);font-size:13px">No services yet.</p></div>
      <button class="btn btn-secondary" style="width:auto;padding:8px 16px;font-size:13px;margin-top:12px" onclick="document.getElementById('add-service-form').style.display='block'">+ Add Service</button>
      <div class="add-service-form" id="add-service-form">
        <div class="row-2">
          <div class="field"><label>Service Name</label><input type="text" id="new-svc-name" placeholder="e.g. Quran Classes"></div>
          <div class="field"><label>Type</label>
            <select id="new-svc-type">
              <option>Education</option><option>Youth</option><option>Welfare</option><option>Community</option>
            </select>
          </div>
        </div>
        <div class="row-2">
          <div class="field"><label>Days</label><input type="text" id="new-svc-days" placeholder="e.g. Mon-Fri"></div>
          <div class="field"><label>Time</label><input type="text" id="new-svc-time" placeholder="e.g. 17:00"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="btn" style="padding:8px 16px;font-size:13px" onclick="addService()">Add</button>
          <button class="btn btn-secondary" style="padding:8px 16px;font-size:13px" onclick="document.getElementById('add-service-form').style.display='none'">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ANNOUNCEMENTS TAB -->
  <div id="tab-announce" style="display:none">
    <div class="dash-card">
      <h3>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        Announcements
      </h3>
      <div id="announcements-list"><p style="color:var(--muted);font-size:13px">No announcements yet.</p></div>
      <div class="dash-card" style="margin-top:16px;margin-bottom:0;background:var(--card2)">
        <h3 style="margin-bottom:12px">New Announcement</h3>
        <div class="field"><label>Title</label><input type="text" id="ann-title" placeholder="Announcement title"></div>
        <div class="field"><label>Description</label><textarea id="ann-desc" placeholder="Details..."></textarea></div>
        <div class="row-2">
          <div class="field"><label>Date</label><input type="date" id="ann-date"></div>
          <div class="field"><label>Category</label>
            <select id="ann-cat"><option>General</option><option>Event</option><option>Notice</option><option>Closure</option></select>
          </div>
        </div>
        <button class="btn" style="margin-top:4px" onclick="addAnnouncement()">Post Announcement</button>
      </div>
    </div>
  </div>

  <!-- CHANGE PIN TAB -->
  <div id="tab-pin" style="display:none">
    <div class="dash-card">
      <h3>
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        Change PIN
      </h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Choose a new PIN for your institute login.</p>
      <div class="field" style="max-width:200px"><label>New PIN</label><input type="password" id="new-pin" placeholder="4-6 digits" maxlength="6"></div>
      <div class="field" style="max-width:200px"><label>Confirm PIN</label><input type="password" id="confirm-pin" placeholder="Repeat PIN" maxlength="6"></div>
      <button class="btn" style="max-width:200px" onclick="changePin()">Update PIN</button>
      <div id="pin-status" style="display:none;margin-top:12px;font-size:13px"></div>
    </div>
  </div>

</div>

<script>
var SB  = 'https://bfevwoykvnogmgxdkxdj.supabase.co';
var KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJmZXZ3b3lrdm5vZ21neGRreGRqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNDgwNjEsImV4cCI6MjA5MTcyNDA2MX0.8I--P9h_jYsSlvkthF76O1m0mcFkgI8mcRmKVgXOHAk';

var currentInstitute = null;
var currentAdminId   = null;
var currentData      = { services: [], announcements: [] };

function sbFetch(path, opts) {
  opts = opts || {};
  var method = opts.method || 'GET';
  var headers = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY, 'Content-Type': 'application/json' };
  if (method !== 'GET') headers['Prefer'] = 'return=representation';
  return fetch(SB + '/rest/v1/' + path, Object.assign({}, opts, {
    headers: Object.assign(headers, opts.headers || {})
  }));
}

function showError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}

function showSaveStatus(msg, ok) {
  var el = document.getElementById('save-status');
  if (!el) return;
  el.style.display = 'flex';
  el.innerHTML = (ok
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="#047857"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'
    : '<span class="saving-spinner"></span>') + msg;
  el.style.color = ok ? 'var(--green)' : 'var(--muted)';
  if (ok) setTimeout(function() { el.style.display = 'none'; }, 2500);
}

// LOGIN
document.getElementById('login-btn').addEventListener('click', doLogin);
document.getElementById('inst-pin-input').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });

function doLogin() {
  var id  = document.getElementById('inst-id-input').value.trim().toLowerCase();
  var pin = document.getElementById('inst-pin-input').value.trim();
  var errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!id || !pin) { showError('Please enter your Institute ID and PIN.'); return; }
  showError('Checking...');

  sbFetch('institutes?slug=eq.' + encodeURIComponent(id) + '&select=id,name,address,area,slug,phone,website,about,type,institute_admins(id,pin_hash)')
    .then(function(r){ return r.json(); })
    .then(function(rows) {
      if (!Array.isArray(rows) || !rows.length) {
        showError('Institute ID not found. Contact admin@qiblah.app.');
        return;
      }
      var inst   = rows[0];
      var admins = inst.institute_admins || [];
      var admin  = admins.find(function(a){ return a.pin_hash === pin; });
      if (!admin) { showError('Incorrect PIN. Contact admin@qiblah.app.'); return; }
      currentInstitute = { id: inst.id, slug: inst.slug, name: inst.name, address: inst.address, area: inst.area, phone: inst.phone||'', website: inst.website||'', about: inst.about||'', type: inst.type||'Islamic Centre' };
      currentAdminId   = admin.id;
      loadDashboard();
    })
    .catch(function(){ showError('Connection error. Please try again.'); });
}

function loadDashboard() {
  document.getElementById('login-screen').style.display  = 'none';
  document.getElementById('header').style.display        = 'block';
  document.getElementById('dashboard').style.display     = 'block';
  document.getElementById('header-inst-name').textContent = currentInstitute.name;
  document.getElementById('dash-inst-title').textContent  = currentInstitute.name;
  document.getElementById('dash-inst-address').textContent = currentInstitute.address || '';
  loadFromSupabase();
}

function loadFromSupabase() {
  var mid = currentInstitute.id;
  var p1 = sbFetch('services?institute_id=eq.' + mid + '&select=*')
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if (!Array.isArray(rows)) return;
      currentData.services = rows.map(function(s){ return { name:s.name, type:s.type||'Education', days:s.days||'', time:s.time||'', _id:s.id }; });
    });
  var p2 = sbFetch('announcements?institute_id=eq.' + mid + '&select=*&order=created_at.desc')
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if (!Array.isArray(rows)) return;
      currentData.announcements = rows.map(function(a){ return { title:a.title, desc:a.description||'', date:a.date||'', category:a.category||'General', _id:a.id }; });
    });
  Promise.all([p1, p2]).then(function(){
    renderProfile();
    renderServices();
    renderAnnouncements();
  });
}

// PROFILE
function renderProfile() {
  var i = currentInstitute;
  document.getElementById('profile-name').value    = i.name    || '';
  document.getElementById('profile-address').value = i.address || '';
  document.getElementById('profile-phone').value   = i.phone   || '';
  document.getElementById('profile-website').value = i.website || '';
  document.getElementById('profile-about').value   = i.about   || '';
  document.getElementById('profile-area').value    = i.area    || '';
  var typeEl = document.getElementById('profile-type');
  if (typeEl) typeEl.value = i.type || 'Islamic Centre';
}

function saveProfile() {
  showSaveStatus('Saving...', false);
  var payload = {
    name:    document.getElementById('profile-name').value.trim(),
    address: document.getElementById('profile-address').value.trim(),
    phone:   document.getElementById('profile-phone').value.trim(),
    website: document.getElementById('profile-website').value.trim(),
    about:   document.getElementById('profile-about').value.trim(),
    area:    document.getElementById('profile-area').value.trim(),
    type:    document.getElementById('profile-type').value
  };
  sbFetch('institutes?id=eq.' + currentInstitute.id, { method: 'PATCH', body: JSON.stringify(payload) })
    .then(function(r){
      if (r.ok) {
        Object.assign(currentInstitute, payload);
        document.getElementById('dash-inst-title').textContent   = payload.name || currentInstitute.name;
        document.getElementById('dash-inst-address').textContent = payload.address || '';
        document.getElementById('header-inst-name').textContent  = payload.name || currentInstitute.name;
        showSaveStatus('Profile saved', true);
      } else { r.text().then(function(t){ showSaveStatus('Error: ' + t.slice(0,60), false); }); }
    }).catch(function(){ showSaveStatus('Connection error', false); });
}

// SERVICES
function renderServices() {
  var el = document.getElementById('services-list');
  if (!currentData.services.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">No services yet.</p>'; return; }
  el.innerHTML = currentData.services.map(function(s, i) {
    var typeCls = 't-' + (s.type||'Education').replace(/\s+/g, '');
    return '<div class="service-item">' +
      '<div class="service-info">' +
        '<div class="sname">' + s.name + '<span class="type-badge ' + typeCls + '">' + s.type + '</span></div>' +
        '<div class="smeta">' + [s.days, s.time].filter(Boolean).join(' · ') + '</div>' +
      '</div>' +
      '<button class="del-btn" data-idx="' + i + '" title="Delete">×</button>' +
    '</div>';
  }).join('');
  el.querySelectorAll('.del-btn').forEach(function(btn) {
    btn.addEventListener('click', function(){ deleteService(parseInt(this.dataset.idx)); });
  });
}

function addService() {
  var name = document.getElementById('new-svc-name').value.trim();
  if (!name) { alert('Service name required'); return; }
  var payload = {
    institute_id: currentInstitute.id,
    name: name,
    type: document.getElementById('new-svc-type').value,
    days: document.getElementById('new-svc-days').value.trim(),
    time: document.getElementById('new-svc-time').value.trim()
  };
  sbFetch('institute_services', { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(function(rows) {
      if (rows && rows[0]) {
        currentData.services.push({ name:rows[0].name, type:rows[0].type, days:rows[0].days||'', time:rows[0].time||'', _id:rows[0].id });
        renderServices();
        document.getElementById('new-svc-name').value = '';
        document.getElementById('new-svc-days').value = '';
        document.getElementById('new-svc-time').value = '';
        document.getElementById('add-service-form').style.display = 'none';
      }
    });
}

function deleteService(idx) {
  var s = currentData.services[idx];
  if (!s || !confirm('Delete "' + s.name + '"?')) return;
  sbFetch('institute_services?id=eq.' + s._id, { method: 'DELETE' })
    .then(function(){ currentData.services.splice(idx, 1); renderServices(); });
}

// ANNOUNCEMENTS
function renderAnnouncements() {
  var el = document.getElementById('announcements-list');
  if (!currentData.announcements.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">No announcements yet.</p>'; return; }
  el.innerHTML = currentData.announcements.map(function(a, i) {
    return '<div class="announcement-item">' +
      '<div class="ann-body">' +
        '<div class="atitle">' + a.title + '</div>' +
        '<div class="adesc">' + [a.category, a.date].filter(Boolean).join(' · ') + (a.desc ? ' — ' + a.desc : '') + '</div>' +
      '</div>' +
      '<button class="del-btn" data-idx="' + i + '" title="Delete">×</button>' +
    '</div>';
  }).join('');
  el.querySelectorAll('.del-btn').forEach(function(btn){
    btn.addEventListener('click', function(){ deleteAnnouncement(parseInt(this.dataset.idx)); });
  });
}

function addAnnouncement() {
  var title = document.getElementById('ann-title').value.trim();
  if (!title) { alert('Title required'); return; }
  var payload = {
    institute_id: currentInstitute.id,
    title: title,
    description: document.getElementById('ann-desc').value.trim(),
    date: document.getElementById('ann-date').value || null,
    category: document.getElementById('ann-cat').value
  };
  sbFetch('announcements', { method: 'POST', body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(function(rows){
      if (rows && rows[0]) {
        currentData.announcements.unshift({ title:rows[0].title, desc:rows[0].description||'', date:rows[0].date||'', category:rows[0].category||'General', _id:rows[0].id });
        renderAnnouncements();
        document.getElementById('ann-title').value = '';
        document.getElementById('ann-desc').value  = '';
        document.getElementById('ann-date').value  = '';
      }
    });
}

function deleteAnnouncement(idx) {
  var a = currentData.announcements[idx];
  if (!a || !confirm('Delete this announcement?')) return;
  sbFetch('announcements?id=eq.' + a._id, { method: 'DELETE' })
    .then(function(){ currentData.announcements.splice(idx, 1); renderAnnouncements(); });
}

// CHANGE PIN
function changePin() {
  var np = document.getElementById('new-pin').value.trim();
  var cp = document.getElementById('confirm-pin').value.trim();
  var st = document.getElementById('pin-status');
  if (!np || np.length < 4) { st.style.display='block'; st.style.color='var(--red)'; st.textContent='PIN must be at least 4 digits.'; return; }
  if (np !== cp) { st.style.display='block'; st.style.color='var(--red)'; st.textContent='PINs do not match.'; return; }
  sbFetch('institute_admins?id=eq.' + currentAdminId, { method: 'PATCH', body: JSON.stringify({ pin_hash: np }) })
    .then(function(r){
      st.style.display = 'block';
      if (r.ok) { st.style.color='var(--green)'; st.textContent='PIN updated successfully.'; document.getElementById('new-pin').value=''; document.getElementById('confirm-pin').value=''; }
      else { st.style.color='var(--red)'; st.textContent='Error updating PIN.'; }
    });
}

// TAB SWITCHING
function switchTab(tab) {
  ['profile','services','announce','pin'].forEach(function(t) {
    var el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach(function(b, i) {
    b.classList.toggle('active', ['profile','services','announce','pin'][i] === tab);
  });
}

function doLogout() {
  currentInstitute = null; currentAdminId = null;
  document.getElementById('login-screen').style.display  = 'flex';
  document.getElementById('header').style.display        = 'none';
  document.getElementById('dashboard').style.display     = 'none';
  document.getElementById('inst-id-input').value = '';
  document.getElementById('inst-pin-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}
</script>
</body>
</html>
